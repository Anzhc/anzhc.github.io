<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <link rel="canonical" href="https://anzhc.github.io/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Anzhc" />
    <meta property="og:url" content="https://anzhc.github.io/" />
    <meta property="og:title" content="Anzhc" />
    <meta property="og:image" content="https://anzhc.github.io/og-image-v6.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Anzhc site preview with avatar and AI projects summary."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Anzhc" />
    <meta name="twitter:image" content="https://anzhc.github.io/og-image-v6.png" />
    <meta name="theme-color" content="#071018" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Electrolize&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="/favicon-256.png" sizes="256x256" />
    <script>
      (() => {
        const themeKey = 'resume-theme';

        try {
          const storedTheme = window.localStorage.getItem(themeKey);
          const theme = storedTheme === 'light' ? 'light' : 'dark';
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <title>Anzhc</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
